<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram User ID Finder</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0ea5e9;
  font-family: 'Segoe UI', Arial, sans-serif;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
.container {
  width: 100%;
  max-width: 500px;
  margin-top: 40px;
}
h1 {
  color: #fff;
  text-align: center;
  font-size: 22px;
  margin-bottom: 25px;
  font-weight: 700;
}
.card {
  background: #fff;
  border-radius: 20px;
  padding: 30px 25px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.input-box {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
input {
  flex: 1;
  padding: 12px 15px;
  border: 2px solid #e5e7eb;
  border-radius: 10px;
  font-size: 15px;
  outline: none;
}
input:focus {
  border-color: #0ea5e9;
}
button {
  padding: 12px 20px;
  background: #0ea5e9;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
}
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.label {
  color: #0ea5e9;
  font-weight: 700;
  font-size: 14px;
  margin-top: 18px;
  margin-bottom: 5px;
}
.value {
  font-size: 18px;
  color: #111827;
  font-weight: 600;
}
.username {
  display: inline-block;
  color: #0ea5e9;
  text-decoration: none;
  border: 1px dashed #0ea5e9;
  padding: 5px 10px;
  border-radius: 8px;
}
.copy-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  margin-left: 8px;
}
.share-icons {
  display: flex;
  gap: 12px;
  margin-top: 15px;
}
.share-icons button {
  width: 40px;
  height: 40px;
  padding: 0;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.loading {
  text-align: center;
  color: #6b7280;
  padding: 20px;
}
.error {
  color: #ef4444;
  text-align: center;
  padding: 15px;
  background: #fee2e2;
  border-radius: 10px;
}
.result {
  display: none;
}
</style>
</head>
<body>

<div class="container">
  <h1>INSTAGRAM USER ID & ACCOUNT INFORMATION</h1>
  
  <div class="card">
    <div class="input-box">
      <input type="text" id="username" placeholder="Enter username without @">
      <button id="searchBtn" onclick="getUserData()">Search</button>
    </div>

    <div id="loading" class="loading" style="display:none;">Loading...</div>
    <div id="error" class="error" style="display:none;"></div>

    <div id="result" class="result">
      <div class="label">INSTAGRAM ID</div>
      <div class="value">
        <span id="userid">-</span>
        <button class="copy-btn" onclick="copyText('userid')">📋</button>
      </div>

      <div class="label">INSTAGRAM USERNAME</div>
      <div class="value">
        <a id="userlink" class="username" href="#" target="_blank">@-</a>
      </div>

      <div class="label">FOLLOWER COUNT</div>
      <div class="value" id="followers">-</div>

      <div class="label">FOLLOWING COUNT</div>
      <div class="value" id="following">-</div>

      <div class="label">SHARE OR COPY INSTAGRAM ID</div>
      <div class="share-icons">
        <button style="background:#000" onclick="share('x')">𝕏</button>
        <button style="background:#25D366" onclick="share('wa')">💬</button>
        <button style="background:#000" onclick="share('copy')">📋</button>
      </div>
    </div>
  </div>
</div>

<script>
async function getUserData() {
  const username = document.getElementById('username').value.trim().replace('@', '');
  if(!username) return alert('Username dao');

  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('searchBtn').disabled = true;

  try {
    // Using allorigins proxy to bypass CORS and fetch public profile
    const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://www.instagram.com/' + username + '/?__a=1&__d=dis')}`;
    const res = await fetch(url);
    const data = await res.json();
    
    const json = JSON.parse(data.contents);
    const user = json.graphql.user;

    document.getElementById('userid').textContent = user.id;
    document.getElementById('userlink').textContent = '@' + user.username;
    document.getElementById('userlink').href = 'https://instagram.com/' + user.username;
    document.getElementById('followers').textContent = user.edge_followed_by.count;
    document.getElementById('following').textContent = user.edge_follow.count;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('result').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'User pawa jayni. Private account ba vul username hote pare.';
  }
  
  document.getElementById('searchBtn').disabled = false;
}

function copyText(id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text);
  alert('Copied: ' + text);
}

function share(platform) {
  const id = document.getElementById('userid').textContent;
  const text = `Instagram ID: ${id}`;
  
  if(platform === 'x') {
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`);
  } else if(platform === 'wa') {
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
  } else if(platform === 'copy') {
    copyText('userid');
  }
}
</script>

</body>
</html>
