<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram User ID Finder</title>
<style>
body {
  background: #0ea5e9;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
.wrap {
  width: 100%;
  max-width: 500px;
  margin-top: 30px;
}
h1 {
  color: #fff;
  text-align: center;
  font-size: 20px;
  margin-bottom: 20px;
}
.card {
  background: #fff;
  border-radius: 20px;
  padding: 25px 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.input-row {
  display: flex;
  gap: 10px;
}
input {
  flex: 1;
  padding: 12px;
  border: 2px solid #ddd;
  border-radius: 10px;
  font-size: 15px;
  outline: none;
}
input:focus { border-color: #0ea5e9; }
button {
  padding: 12px 18px;
  background: #0ea5e9;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
}
button:disabled { opacity: 0.6; }
.label {
  color: #0ea5e9;
  font-weight: 700;
  font-size: 13px;
  margin-top: 18px;
}
.value {
  font-size: 18px;
  color: #111;
  font-weight: 600;
  margin-top: 4px;
}
.copy-btn {
  background: none;
  border: none;
  cursor: pointer;
  margin-left: 8px;
}
.username {
  display: inline-block;
  color: #0ea5e9;
  text-decoration: none;
  border: 1px dashed #0ea5e9;
  padding: 5px 10px;
  border-radius: 8px;
}
.msg {
  padding: 12px;
  border-radius: 10px;
  margin-top: 15px;
  text-align: center;
  display: none;
}
.loading { background: #f3f4f6; color: #374151; }
.error { background: #fee2e2; color: #dc2626; }
.result { display: none; }
.share {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}
.share button {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  padding: 0;
}
</style>
</head>
<body>

<div class="wrap">
  <h1>INSTAGRAM USER ID & ACCOUNT INFORMATION</h1>
  
  <div class="card">
    <div class="input-row">
      <input type="text" id="user" placeholder="Enter username">
      <button id="btn" onclick="search()">Search</button>
    </div>

    <div id="load" class="msg loading">Loading...</div>
    <div id="err" class="msg error"></div>

    <div id="res" class="result">
      <div class="label">INSTAGRAM ID</div>
      <div class="value">
        <span id="uid">-</span>
        <button class="copy-btn" onclick="copy('uid')">📋</button>
      </div>

      <div class="label">INSTAGRAM USERNAME</div>
      <div class="value">
        <a id="ulink" class="username" href="#" target="_blank">@-</a>
      </div>

      <div class="label">FOLLOWER COUNT</div>
      <div class="value" id="followers">-</div>

      <div class="label">FOLLOWING COUNT</div>
      <div class="value" id="following">-</div>

      <div class="label">SHARE OR COPY INSTAGRAM ID</div>
      <div class="share">
        <button style="background:#000" onclick="share('x')">𝕏</button>
        <button style="background:#25D366" onclick="share('wa')">💬</button>
        <button style="background:#333" onclick="share('copy')">📋</button>
      </div>
    </div>
  </div>
</div>

<script>
async function search() {
  let u = document.getElementById('user').value.trim().replace('@','');
  if(!u) return alert('Username dao');
  
  toggle('load', true);
  toggle('res', false);
  toggle('err', false);
  document.getElementById('btn').disabled = true;

  try {
    // Try multiple public proxies
    let data = await fetchData(u);
    
    document.getElementById('uid').textContent = data.id;
    document.getElementById('ulink').textContent = '@' + data.username;
    document.getElementById('ulink').href = 'https://instagram.com/' + data.username;
    document.getElementById('followers').textContent = data.followers;
    document.getElementById('following').textContent = data.following;
    
    toggle('load', false);
    toggle('res', true);
  } catch(e) {
    toggle('load', false);
    document.getElementById('err').textContent = 'User pawa jayni. Private account ba vul username hote pare.';
    toggle('err', true);
  }
  
  document.getElementById('btn').disabled = false;
}

async function fetchData(username) {
  // Proxy 1
  try {
    let r = await fetch(`https://api.allorigins.win/raw?url=https://i.instagram.com/api/v1/users/web_profile_info/?username=${username}`);
    let j = await r.json();
    if(j.data && j.data.user) {
      return {
        id: j.data.user.id,
        username: j.data.user.username,
        followers: j.data.user.edge_followed_by.count,
        following: j.data.user.edge_follow.count
      };
    }
  } catch(e) {}

  // Proxy 2 - fallback
  let r2 = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.instagram.com/'+username+'/?__a=1&__d=dis')}`);
  let d2 = await r2.json();
  let j2 = JSON.parse(d2.contents);
  let u = j2.graphql.user;
  
  return {
    id: u.id,
    username: u.username,
    followers: u.edge_followed_by.count,
    following: u.edge_follow.count
  };
}

function toggle(id, show) {
  document.getElementById(id).style.display = show ? 'block' : 'none';
}

function copy(id) {
  navigator.clipboard.writeText(document.getElementById(id).textContent);
  alert('Copied!');
}

function share(type) {
  let txt = 'Instagram ID: ' + document.getElementById('uid').textContent;
  if(type==='x') window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(txt));
  if(type==='wa') window.open('https://wa.me/?text='+encodeURIComponent(txt));
  if(type==='copy') copy('uid');
}
</script>

</body>
</html>
